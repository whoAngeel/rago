name: Deploy to Homelab

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Build Go binary
        run: CGO_ENABLED=0 go build -o server ./cmd/server/

      - name: Build Docker image
        run: docker build -t rago:latest .

      - name: Sync compose and deploy
        run: |
          cp docker-compose.yml /home/whoangel/rago/
          cd /home/whoangel/rago
          docker compose up -d --remove-orphans
          docker image prune -f

      - name: Smoke test
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' rago-app-1 2>/dev/null || echo "missing")
            if [ "$STATUS" = "healthy" ]; then
              echo "Container healthy!"
              break
            fi
            echo "  [$i/30] status=$STATUS, waiting..."
            sleep 2
          done

          echo "Testing /health endpoint..."
          curl -f -m 5 http://localhost:4000/health && echo "OK: /health responded" || {
            echo "FAIL: /health not responding"
            docker compose -f /home/whoangel/rago/docker-compose.yml logs --tail=30 app
            exit 1
          }
