name: Deploy to Homelab

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rago:latest .

      - name: Deploy
        run: |
          cd /home/whoangel/rago
          docker compose up -d --remove-orphans
          docker image prune -f
