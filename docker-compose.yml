services:
  app:
    image: rago:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: rago
      POSTGRES_PASSWORD: rago
      POSTGRES_DB: rago
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rago"]
      interval: 5s
      retries: 5

volumes:
  pg_data:
